name: Trigger Install Site Rebuild

on:
  workflow_dispatch:

concurrency:
  group: install-site-rebuild-${{ github.ref }}
  cancel-in-progress: true

jobs:
  trigger-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install site dependencies
        run: npm install
        working-directory: site/install-web

      - name: Deploy install site
        shell: bash
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CF_PAGES_PROJECT_NAME: dexproject
        run: npm run site:install:deploy
