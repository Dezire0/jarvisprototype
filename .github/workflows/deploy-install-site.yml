name: Deploy Install Site

on:
  push:
    branches:
      - main
    paths:
      - "package.json"
      - "site/install-web/**"
      - "scripts/sync-install-site-config.cjs"
      - "scripts/deploy-install-site.cjs"
  release:
    types:
      - published
  workflow_dispatch:

concurrency:
  group: install-site-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || github.sha }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: site/install-web/package-lock.json

      - name: Install install-site dependencies
        run: npm ci
        working-directory: site/install-web

      - name: Deploy to Cloudflare Pages
        run: |
          if [ -z "${CLOUDFLARE_API_TOKEN}" ] || [ -z "${CLOUDFLARE_ACCOUNT_ID}" ]; then
            echo "Cloudflare deploy skipped because CLOUDFLARE_API_TOKEN or CLOUDFLARE_ACCOUNT_ID is not configured."
            exit 0
          fi

          node ../../scripts/deploy-install-site.cjs
        working-directory: site/install-web
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CF_PAGES_PROJECT_NAME: dexproject
          CF_PAGES_BRANCH: main
          CF_PAGES_COMMIT_HASH: ${{ github.sha }}
          CF_PAGES_COMMIT_MESSAGE: ${{ github.event.head_commit.message || github.event.release.name || github.event.release.tag_name }}
          CF_PAGES_COMMIT_DIRTY: "false"
