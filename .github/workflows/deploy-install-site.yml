name: Trigger Install Site Rebuild

on:
  workflow_dispatch:

concurrency:
  group: install-site-rebuild-${{ github.ref }}
  cancel-in-progress: true

jobs:
  trigger-rebuild:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Trigger Cloudflare Pages build hook
        shell: bash
        env:
          CLOUDFLARE_PAGES_BUILD_HOOK: ${{ secrets.CLOUDFLARE_PAGES_BUILD_HOOK }}
        run: |
          if [ -z "${CLOUDFLARE_PAGES_BUILD_HOOK}" ]; then
            echo "Cloudflare build hook is not configured. Set CLOUDFLARE_PAGES_BUILD_HOOK in GitHub Actions secrets." >&2
            exit 1
          fi

          curl --fail --show-error --silent -X POST "${CLOUDFLARE_PAGES_BUILD_HOOK}"
