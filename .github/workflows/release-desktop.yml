name: Release Desktop App

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: release-desktop-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      package_changed: ${{ steps.changes.outputs.package_changed }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve package version
        id: version
        shell: bash
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Detect package.json change
        id: changes
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            echo "package_changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "${GITHUB_EVENT_NAME}" == "push" && "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "package_changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if git diff --name-only "${GITHUB_SHA}^" "${GITHUB_SHA}" | grep -qx "package.json"; then
            echo "package_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "package_changed=false" >> "$GITHUB_OUTPUT"
          fi

  create-tag:
    needs: prepare
    if: github.ref == 'refs/heads/main' && needs.prepare.outputs.package_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create and push release tag
        shell: bash
        run: |
          VERSION="v${{ needs.prepare.outputs.version }}"

          if git ls-remote --tags origin "refs/tags/${VERSION}" | grep -q "${VERSION}"; then
            echo "Tag ${VERSION} already exists. Skipping tag creation."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${VERSION}" -m "Release ${VERSION}"
          git push origin "${VERSION}"

  release:
    needs: prepare
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            label: macOS
          - os: windows-latest
            label: Windows
          - os: ubuntu-latest
            label: Linux
    runs-on: ${{ matrix.os }}

    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      JARVIS_UPDATER_PROVIDER: github
      JARVIS_GITHUB_OWNER: Dezire0
      JARVIS_GITHUB_REPO: jarvisprototype
      JARVIS_GITHUB_RELEASE_TYPE: release
      CSC_LINK: ${{ secrets.CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
      CSC_NAME: ${{ secrets.CSC_NAME }}
      APPLE_KEYCHAIN_PROFILE: ${{ secrets.APPLE_KEYCHAIN_PROFILE }}
      APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
      APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      JARVIS_REQUIRE_NOTARIZATION: ${{ secrets.APPLE_KEYCHAIN_PROFILE != '' || secrets.APPLE_API_KEY != '' || secrets.APPLE_ID != '' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate tag matches package version
        shell: bash
        run: |
          VERSION="v${{ needs.prepare.outputs.version }}"
          if [[ "${GITHUB_REF_NAME}" != "${VERSION}" ]]; then
            echo "Tag ${GITHUB_REF_NAME} does not match package.json version ${VERSION}" >&2
            exit 1
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Enable Corepack
        run: corepack enable

      - name: Install root dependencies
        run: npm ci

      - name: Install Jarvis UI workspace dependencies
        run: corepack pnpm --dir "Jarvis Ui" install --frozen-lockfile

      - name: Build and publish ${{ matrix.label }}
        run: npm run release
