name: Release Desktop App

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: release-desktop-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate-tag:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate tag matches package version
        id: version
        shell: bash
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            if [[ "v${VERSION}" != "${GITHUB_REF_NAME}" ]]; then
              echo "Tag ${GITHUB_REF_NAME} does not match package.json version v${VERSION}" >&2
              exit 1
            fi
          fi

  release:
    needs: validate-tag
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            label: macOS
          - os: windows-latest
            label: Windows
          - os: ubuntu-latest
            label: Linux
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      JARVIS_UPDATER_PROVIDER: github
      JARVIS_GITHUB_OWNER: Dezire0
      JARVIS_GITHUB_REPO: jarvisprototype
      JARVIS_GITHUB_RELEASE_TYPE: release
      CSC_LINK: ${{ secrets.CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
      CSC_NAME: ${{ secrets.CSC_NAME }}
      APPLE_KEYCHAIN_PROFILE: ${{ secrets.APPLE_KEYCHAIN_PROFILE }}
      APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
      APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      JARVIS_REQUIRE_NOTARIZATION: ${{ secrets.APPLE_KEYCHAIN_PROFILE != '' || secrets.APPLE_API_KEY != '' || secrets.APPLE_ID != '' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Enable Corepack
        run: corepack enable

      - name: Install root dependencies
        run: npm ci

      - name: Install Jarvis UI workspace dependencies
        run: corepack pnpm --dir "Jarvis Ui" install --frozen-lockfile

      - name: Build and publish ${{ matrix.label }}
        run: npm run release
