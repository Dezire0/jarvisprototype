<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>자비스</title>
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body>
    <main class="popup-shell">
      <header class="window-bar" title="여기를 드래그해서 이동">
        <div class="drag-strip" aria-hidden="true">
          <span class="drag-pill"></span>
        </div>
        <div class="window-actions">
          <button type="button" class="settings-link" id="popupMuteToggle">Jarvis Voice On</button>
          <button type="button" class="settings-link" id="openSettingsButton">데스크톱 앱 열기</button>
        </div>
      </header>

      <section class="orb-panel">
        <div class="orb" id="orb" aria-hidden="true">
          <span class="orb-ring orb-ring-a"></span>
          <span class="orb-ring orb-ring-b"></span>
          <span class="orb-core"></span>
        </div>
        <p class="status-line" id="popupStatus">다음 요청을 말씀해 주세요.</p>
      </section>

      <section class="response-panel" id="messages" aria-live="polite"></section>

      <form id="commandForm" class="composer">
        <textarea
          id="commandInput"
          rows="3"
          placeholder="편하게 말하듯 입력해 주세요..."
        ></textarea>
        <div class="composer-footer">
          <span class="shortcut-hint" id="shortcutHint"></span>
          <button type="submit" id="submitButton">보내기</button>
        </div>
      </form>
    </main>
    <script type="module" src="./popup.js"></script>
  </body>
</html>
